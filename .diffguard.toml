# Diffguard Configuration
# All options shown with their default values.

# LLM model for security analysis
# model = "gpt-5.2"

# Number of lines to expand around each changed hunk
# hunk_expansion_lines = 50

# Maximum lines for scope extraction before truncation
# scope_size_limit = 200

# How deep to follow imports for symbol resolution (0 = disabled)
# symbol_resolution_depth = 1

# Patterns identifying third-party code paths (excluded from analysis and symbol resolution)
# third_party_patterns = ["venv/", ".venv/", "site-packages/", "node_modules/", "bower_components/", "target/", "build/", ".gradle/", "vendor/bundle/", "vendor/ruby/", ".bundle/", "tmp/cache/", "log/", "vendor/", "storage/framework/"]

# LLM sampling temperature (0 = deterministic, higher = more creative)
# temperature = 0.0

# Minimum confidence level for findings ("Low", "Medium", "High")
# Set to "Medium" to filter out borderline findings and improve run-to-run consistency
# min_confidence = "Low"

# Maximum concurrent API calls
# max_concurrent_api_calls = 5

# API timeout in seconds
# timeout = 120

# Additional glob patterns for sensitive file exclusion (added to built-in defaults)
# sensitive_patterns = []

# Built-in sensitive file patterns are enabled by default for security.
# Set to false to disable them (use only your custom patterns).
use_default_sensitive_patterns = true

# Path to baseline file (relative to project root)
# baseline_path = ".diffguard-baseline.json"

# Severity thresholds: action per severity level (block, warn, allow)
# [thresholds]
# critical = "block"
# high = "block"
# medium = "warn"
# low = "allow"
# info = "allow"
